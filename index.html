<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazada Clone Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-container">
            <span>Save More on App</span>
            <span>Sell on Marketplace</span>
            <span>Customer Care</span>
            <span>Track My Order</span>
        </div>
    </div>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">Lazada<span>Clone</span></div>
            
            <div class="search-box">
                <input type="text" placeholder="Search in Lazada..." id="searchInput" oninput="searchProducts(this.value)">
                <button>🔍</button>
            </div>

            <div class="cart-icon" onclick="toggleCart()">
                🛒 <span id="cartCount">0</span>
            </div>
        </div>
    </nav>

    <header class="hero-banner">
        <div class="banner-content">
            <h2>Super Flash Sale</h2>
            <p>Up to 70% OFF | Free Shipping Nationwide</p>
            <button class="shop-now-btn">Shop Now</button>
        </div>
    </header>

    <section class="channels-section">
        <div class="channel-card" onclick="filterCategory('all')">🌟 All Deals</div>
        <div class="channel-card" onclick="filterCategory('electronics')">📱 Electronics</div>
        <div class="channel-card" onclick="filterCategory('clothing')">👗 Fashion</div>
        <div class="channel-card" onclick="filterCategory('accessories')">⌚ Accessories</div>
    </section>

    <main class="main-content">
        <h2 class="section-title">Just For You</h2>
        <div class="grid" id="productGrid"></div>
    </main>

    <div class="cart-drawer" id="cartDrawer">
        <div class="drawer-header">
            <h3>Shopping Cart</h3>
            <button class="close-drawer-btn" onclick="toggleCart()">✕</button>
        </div>
        <div id="cartItems" class="drawer-items-list"></div>
        <div class="drawer-footer">
            <div class="total-row">
                <span>Total:</span>
                <span id="cartTotal">0 MMK</span>
            </div>
            <button class="checkout-btn" onclick="checkoutViaWhatsApp()">Proceed to Checkout (WhatsApp) 💬</button>
        </div>
    </div>
    <div class="cart-overlay" id="cartOverlay" onclick="toggleCart()"></div>

    <script src="shop.js"></script>
</body>
</html>
