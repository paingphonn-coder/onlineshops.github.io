<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">My Shop</div>
        <div class="categories">
            <button onclick="filterCategory('all')">All</button>
            <button onclick="filterCategory('clothing')">Clothing</button>
            <button onclick="filterCategory('electronics')">Electronics</button>
            <button onclick="filterCategory('accessories')">Accessories</button>
        </div>
        <div class="cart-icon-container">
            🛒 Cart (<span id="cartCount">0</span>)
        </div>
    </nav>

    <main class="shop-container">
        <section class="products-section">
            <h2>Our Products</h2>
            <div class="grid" id="productGrid">
                </div>
        </section>

        <aside class="cart-sidebar">
            <h2>Your Shopping Cart</h2>
            <div id="cartItems" class="cart-items-list">
                </div>
            <div class="cart-summary">
                <h3>Total: <span id="cartTotal">0 MMK</span></h3>
                <button class="checkout-btn" onclick="checkoutViaWhatsApp()">Order via WhatsApp 💬</button>
            </div>
        </aside>
    </main>

    <script src="shop.js"></script>
</body>
</html>
